<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Profit Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f6fa;--surface:#fff;--surface2:#f8f9fc;--border:#e2e4ed;--border2:#dde0ec;
  --text:#1a1d2e;--text2:#4a4f6a;--muted:#9095b0;--hint:#c2c6d8;
  --blue:#4f5de8;--blue-bg:#eef0fd;--blue-border:#d5d9f5;
  --orange:#ea7218;--orange-bg:#fff4ec;--orange-border:#fdd4b0;
  --green:#16a34a;--green-bg:#dcfce7;--green-border:#bbf7d0;
  --red:#dc2626;--red-bg:#fee2e2;--red-border:#fecaca;
  --yellow:#d97706;--yellow-bg:#fef9c3;--yellow-border:#fde68a;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* APP */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-logo{width:34px;height:34px;background:var(--blue-bg);border:1px solid var(--blue-border);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.topbar-title{font-size:16px;font-weight:600;color:var(--text);}
.topbar-right{display:flex;align-items:center;gap:10px;}
.main{padding:2rem;}
.metrics{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:1.75rem;}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.9rem 1.1rem;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.mlabel{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.mval{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:var(--text);}
.mval.g{color:var(--green);}.mval.r{color:var(--red);}.mval.y{color:var(--yellow);}
.msub{font-size:11px;color:var(--muted);margin-top:3px;}

/* BUTTONS */
.btn-primary{height:36px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:0 16px;cursor:pointer;transition:background .15s,transform .1s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;}
.btn-primary:hover{background:#3f4dd6;}.btn-primary:active{transform:scale(.97);}
.btn-ghost{height:36px;background:var(--surface);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:0 16px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all .15s;white-space:nowrap;}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg);}
.btn-ghost:disabled{opacity:.4;cursor:not-allowed;}
.btn-danger{height:32px;background:none;border:1px solid var(--red-border);border-radius:7px;color:var(--red);font-family:'DM Sans',sans-serif;font-size:12px;padding:0 12px;cursor:pointer;transition:all .15s;}
.btn-danger:hover{background:var(--red-bg);}

/* ACTION BAR */
.action-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;}
.action-bar-left{display:flex;gap:10px;}

/* ADD PROJECT PANEL */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.2rem 1.4rem;margin-bottom:1.4rem;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.panel-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:1rem;}
.form-row{display:grid;gap:10px;align-items:end;}
.fg label{display:block;font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.fg input,.fg select{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 11px;height:34px;outline:none;transition:border-color .2s;}
.fg input:focus,.fg select:focus{border-color:var(--blue);background:var(--surface);}
.fg input::placeholder{color:var(--hint);}
.fg select option{background:var(--surface);}
.fg input[type=date]::-webkit-calendar-picker-indicator{opacity:.5;}
.input-err{border-color:var(--red)!important;}

/* PROJECT CARDS */
.projects-grid{display:flex;flex-direction:column;gap:14px;}
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .2s,box-shadow .2s;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.proj-card:hover{border-color:#c7cbe8;box-shadow:0 2px 8px rgba(79,93,232,.08);}
.pch{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.2rem;cursor:pointer;user-select:none;}
.pch-left{display:flex;align-items:center;gap:12px;}
.avatar{width:36px;height:36px;border-radius:8px;background:var(--blue-bg);border:1px solid var(--blue-border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--blue);font-family:'DM Mono',monospace;flex-shrink:0;}
.pinfo h3{font-size:14px;font-weight:500;color:var(--text);}
.pmeta{font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:10px;flex-wrap:wrap;}
.pch-right{display:flex;align-items:center;gap:10px;}
.pbadge{font-size:11px;font-weight:600;font-family:'DM Mono',monospace;padding:4px 11px;border-radius:20px;}
.pbadge.g{background:var(--green-bg);color:#15803d;border:1px solid var(--green-border);}
.pbadge.r{background:var(--red-bg);color:#b91c1c;border:1px solid var(--red-border);}
.pbadge.y{background:var(--yellow-bg);color:#a16207;border:1px solid var(--yellow-border);}
.pdel{background:none;border:1px solid transparent;color:var(--hint);cursor:pointer;border-radius:6px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s;}
.pdel:hover{color:var(--red);border-color:var(--red-border);background:var(--red-bg);}
.pchev{font-size:11px;color:var(--muted);transition:transform .25s;}
.pchev.open{transform:rotate(180deg);}
.pbody{border-top:1px solid #eef0f6;padding:1.2rem;display:none;}
.pbody.open{display:block;}

/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:1.2rem;}
.side-panel{background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:1rem;}
.side-title{font-size:11px;font-weight:600;color:#6b7094;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.85rem;display:flex;align-items:center;gap:6px;}
.dot{width:7px;height:7px;border-radius:50%;}
.dot-blue{background:var(--blue);}.dot-orange{background:var(--orange);}
.side-total{display:flex;justify-content:space-between;align-items:center;padding:.6rem .8rem;background:var(--surface);border-radius:8px;margin-top:.8rem;border:1px solid var(--border);}
.side-total-label{font-size:11px;color:var(--muted);}
.side-total-val{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--text);}
.profit-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.2rem;}
.pbar-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.8rem 1rem;}
.pbar-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.pbar-val{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--text);}
.pbar-val.g{color:var(--green);}.pbar-val.r{color:var(--red);}

/* TABLE */
.tbl-wrap{border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:.8rem;}
table{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed;}
thead th{padding:7px 10px;text-align:left;font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;background:#f0f1f8;border-bottom:1px solid var(--border);}
tbody td{padding:5px 6px;border-bottom:1px solid #eef0f6;color:var(--text2);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:#f5f6fb;}
.cell-input{width:100%;background:transparent;border:1px solid transparent;border-radius:4px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:11px;padding:3px 6px;outline:none;transition:all .15s;height:26px;}
.cell-input:hover{border-color:var(--border2);background:var(--surface);}
.cell-input:focus{border-color:var(--blue);background:var(--surface);box-shadow:0 0 0 2px rgba(79,93,232,.1);}
.cell-input.mono{font-family:'DM Mono',monospace;}
.cell-select{width:100%;background:transparent;border:1px solid transparent;border-radius:4px;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:11px;padding:3px 4px;outline:none;transition:all .15s;height:26px;cursor:pointer;}
.cell-select:hover{border-color:var(--border2);background:var(--surface);}
.cell-select:focus{border-color:var(--blue);background:var(--surface);}
.vt-btn{background:var(--blue-bg);border:1px solid var(--blue-border);color:var(--blue);font-family:'DM Mono',monospace;font-size:9px;padding:3px 7px;cursor:pointer;border-radius:4px;transition:all .15s;font-weight:500;white-space:nowrap;}
.vt-btn:hover{background:var(--blue-border);}
.vt-btn.vex{background:var(--orange-bg);border-color:var(--orange-border);color:var(--orange);}
.vt-btn.vex:hover{background:var(--orange-border);}
.idel{background:none;border:none;color:var(--hint);cursor:pointer;padding:2px 5px;border-radius:4px;font-size:10px;transition:color .15s;}
.idel:hover{color:var(--red);}
.total-cell{font-family:'DM Mono',monospace;font-size:11px;font-weight:600;color:var(--text);text-align:right;padding-right:8px;}
.add-item-wrap{margin-top:.7rem;}
.sec-label{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem;}
.ai-btn{height:30px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;padding:0 12px;cursor:pointer;white-space:nowrap;transition:background .15s;}
.ai-btn:hover{background:#3f4dd6;}
.ai-btn.orange{background:var(--orange);}.ai-btn.orange:hover{background:#d4660f;}
.empty-items{text-align:center;padding:1.2rem;color:var(--hint);font-size:12px;}
.empty-proj{text-align:center;padding:4rem 1rem;color:var(--hint);}
.empty-proj .ei{font-size:36px;margin-bottom:10px;}
.empty-proj p{font-size:14px;margin-bottom:1rem;}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:4rem;color:var(--muted);font-size:14px;gap:10px;}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);border-radius:10px;padding:11px 18px;font-size:13px;color:#fff;z-index:9999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;}
.toast.show{opacity:1;transform:none;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(26,29,46,.4);z-index:9000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border-radius:16px;padding:1.75rem;width:360px;box-shadow:0 8px 40px rgba(0,0,0,.12);}
.modal h3{font-size:16px;font-weight:600;margin-bottom:.5rem;}
.modal p{font-size:13px;color:var(--muted);margin-bottom:1.5rem;}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;}

@media(max-width:900px){
  .metrics{grid-template-columns:repeat(2,1fr);}
  .two-col{grid-template-columns:1fr;}
  .form-row{grid-template-columns:1fr 1fr!important;}
  .main{padding:1rem;}
}
</style>
</head>
<body>

<!-- APP -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">📊</div>
    <span class="topbar-title">Profit Tracker</span>
  </div>
  <div class="topbar-right">
    <button class="btn-ghost" onclick="exportPDF()" id="pdf-btn" disabled>⬇ Export PDF</button>
    <button class="btn-primary" onclick="toggleAdd()">＋ New Project</button>
  </div>
</div>

<div class="main">
  <div class="metrics">
    <div class="mc"><div class="mlabel">Projects</div><div class="mval" id="s-count">0</div></div>
    <div class="mc"><div class="mlabel">Total Client Revenue</div><div class="mval" id="s-rev">₱0.00</div></div>
    <div class="mc"><div class="mlabel">Total Supplier Cost</div><div class="mval" id="s-cost">₱0.00</div></div>
    <div class="mc"><div class="mlabel">Net Profit</div><div class="mval" id="s-profit">₱0.00</div></div>
    <div class="mc"><div class="mlabel">Margin</div><div class="mval" id="s-margin">0%</div><div class="msub" id="s-sub">—</div></div>
  </div>

  <div class="panel" id="add-panel" style="display:none;">
    <div class="panel-title">New Project</div>
    <div class="form-row" style="grid-template-columns:2fr 1fr 1fr 1fr auto;">
      <div class="fg"><label>Project Name</label><input id="f-name" type="text" placeholder="e.g. Blk 5 Road Widening"/></div>
      <div class="fg"><label>PO Number</label><input id="f-po" type="text" placeholder="PO-2024-001"/></div>
      <div class="fg"><label>Client Name</label><input id="f-client" type="text" placeholder="e.g. DPWH"/></div>
      <div class="fg"><label>Date</label><input id="f-date" type="date"/></div>
      <button class="btn-primary" style="margin-top:14px;" onclick="addProject()">Create</button>
    </div>
  </div>

  <div id="projects-container">
    <div class="loading"><div class="spinner"></div> Loading projects...</div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">Delete Project?</h3>
    <p id="modal-msg">This action cannot be undone.</p>
    <div class="modal-btns">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-danger" id="modal-confirm-btn">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyArOxeDqhoRym6MzTlx1_8CgotGwvP888Y",
  authDomain: "project-tracker-71da2.firebaseapp.com",
  projectId: "project-tracker-71da2",
  storageBucket: "project-tracker-71da2.firebasestorage.app",
  messagingSenderId: "264497988310",
  appId: "1:264497988310:web:bc755b2a803fbda8ba3f77"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ── CONSTANTS ──────────────────────────────────────────────
const UNITS = ['pc','lot','set','kg','g','L','mL','m','m²','m³','bag','box','roll','sheet','pair','hr','day'];
const VAT = 0.12;
let projects = [];
let openP = new Set();
let addOpen = false;
let modalCallback = null;

// ── HELPERS ────────────────────────────────────────────────
function peso(n){ return '₱' + Number(n).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function pesoP(n){ return 'P' + Number(n).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function initials(n){ return n.trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?'; }
function itemTotal(item){
  let base = item.qty * item.uprice;
  if(item.disc > 0) base *= (1 - item.disc/100);
  if(item.vatex) base *= (1 + VAT);
  return base;
}
function calcProj(proj){
  const rev = (proj.clientItems||[]).reduce((s,i)=>s+itemTotal(i),0);
  const cost = (proj.supplierItems||[]).reduce((s,i)=>s+itemTotal(i),0);
  const profit = rev - cost;
  const margin = rev > 0 ? profit/rev*100 : 0;
  return { rev, cost, profit, margin };
}
function pc(n){ return n>0?'g':n<0?'r':'y'; }

// ── TOAST ──────────────────────────────────────────────────
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

// ── MODAL ──────────────────────────────────────────────────
function showModal(title, msg, onConfirm){
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-msg').textContent = msg;
  document.getElementById('modal-overlay').classList.add('show');
  modalCallback = onConfirm;
}
window.closeModal = ()=>{ document.getElementById('modal-overlay').classList.remove('show'); modalCallback=null; };
document.getElementById('modal-confirm-btn').addEventListener('click', ()=>{ if(modalCallback) modalCallback(); window.closeModal(); });
document.getElementById('modal-overlay').addEventListener('click', e=>{ if(e.target===e.currentTarget) window.closeModal(); });

// ── FIRESTORE ──────────────────────────────────────────────
const projRef = () => collection(db, 'projects');
const oneProj = (id) => doc(db, 'projects', id);

// Listen in real-time
const q = query(projRef(), orderBy('createdAt','desc'));
onSnapshot(q, snap => {
  projects = snap.docs.map(d => ({ firestoreId: d.id, ...d.data() }));
  render();
}, err => {
  console.error(err);
  toast('Error loading projects.');
});

async function saveProj(proj){
  const { firestoreId, ...data } = proj;
  if(firestoreId){
    await updateDoc(oneProj(firestoreId), data);
  } else {
    data.createdAt = serverTimestamp();
    const ref = await addDoc(projRef(), data);
    proj.firestoreId = ref.id;
  }
}
async function removeProj(firestoreId){ await deleteDoc(oneProj(firestoreId)); }

// ── PROJECT ACTIONS ────────────────────────────────────────
window.toggleAdd = function(){
  addOpen = !addOpen;
  document.getElementById('add-panel').style.display = addOpen?'block':'none';
};

window.addProject = async function(){
  const name   = document.getElementById('f-name').value.trim();
  const po     = document.getElementById('f-po').value.trim();
  const client = document.getElementById('f-client').value.trim();
  const date   = document.getElementById('f-date').value;
  const flds   = ['f-name','f-po','f-client','f-date'];
  flds.forEach(id=>document.getElementById(id).classList.remove('input-err'));
  let ok=true;
  if(!name)  { document.getElementById('f-name').classList.add('input-err'); ok=false; }
  if(!po)    { document.getElementById('f-po').classList.add('input-err'); ok=false; }
  if(!client){ document.getElementById('f-client').classList.add('input-err'); ok=false; }
  if(!date)  { document.getElementById('f-date').classList.add('input-err'); ok=false; }
  if(!ok) return;
  const proj = { name, po, client, date, clientItems:[], supplierItems:[] };
  try {
    await saveProj(proj);
    flds.forEach(id=>document.getElementById(id).value='');
    window.toggleAdd();
    toast('Project created!');
  } catch(e){ toast('Error saving project.'); console.error(e); }
};

window.delProj = function(firestoreId, name){
  showModal(`Delete "${name}"?`, 'This will permanently delete the project and all its items.', async ()=>{
    try { await removeProj(firestoreId); toast('Project deleted.'); }
    catch(e){ toast('Error deleting.'); console.error(e); }
  });
};

window.toggleProj = function(id){ openP.has(id)?openP.delete(id):openP.add(id); render(); };

// ── ITEM ACTIONS ───────────────────────────────────────────
window.addItem = async function(firestoreId, side){
  const s = side==='c'?'c':'s';
  const desc   = document.getElementById(`i-desc-${s}-${firestoreId}`).value.trim();
  const unit   = document.getElementById(`i-unit-${s}-${firestoreId}`).value;
  const qty    = parseFloat(document.getElementById(`i-qty-${s}-${firestoreId}`).value);
  const uprice = parseFloat(document.getElementById(`i-up-${s}-${firestoreId}`).value);
  const disc   = parseFloat(document.getElementById(`i-disc-${s}-${firestoreId}`).value)||0;
  const vatBtn = document.getElementById(`i-vatex-${s}-${firestoreId}`);
  const vatex  = vatBtn.dataset.val==='1';
  const supEl  = document.getElementById(`i-sup-s-${firestoreId}`);
  const sup    = supEl ? supEl.value.trim() : '';
  if(!desc||isNaN(qty)||qty<=0||isNaN(uprice)||uprice<0){ toast('Kumpletuhin ang required fields.'); return; }
  const proj = projects.find(p=>p.firestoreId===firestoreId); if(!proj) return;
  const item = { id:uid(), desc, unit, qty, uprice, disc, vatex, sup };
  if(s==='c') proj.clientItems   = [...(proj.clientItems||[]), item];
  else        proj.supplierItems = [...(proj.supplierItems||[]), item];
  try {
    await saveProj(proj);
    [`i-desc-${s}-${firestoreId}`,`i-qty-${s}-${firestoreId}`,`i-up-${s}-${firestoreId}`,`i-disc-${s}-${firestoreId}`]
      .forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
    if(supEl) supEl.value='';
    vatBtn.dataset.val='0'; vatBtn.textContent='VAT In'; vatBtn.className='vt-btn';
  } catch(e){ toast('Error saving item.'); console.error(e); }
};

window.updateItem = async function(firestoreId, side, itemId, field, value){
  const proj = projects.find(p=>p.firestoreId===firestoreId); if(!proj) return;
  const arr  = side==='c' ? proj.clientItems : proj.supplierItems;
  const item = arr.find(i=>i.id===itemId); if(!item) return;
  if(['qty','uprice','disc'].includes(field)){ const v=parseFloat(value); item[field]=isNaN(v)?0:v; }
  else item[field]=value;
  // Live update totals without full re-render
  const tot = itemTotal(item);
  const totEl = document.getElementById(`tot-${side}-${firestoreId}-${itemId}`);
  if(totEl) totEl.textContent = peso(tot);
  const sideArr   = side==='c' ? proj.clientItems : proj.supplierItems;
  const sideTotal = sideArr.reduce((s,i)=>s+itemTotal(i),0);
  const stEl = document.getElementById(`side-tot-${side}-${firestoreId}`);
  if(stEl) stEl.textContent = peso(sideTotal);
  updateProjBadge(firestoreId);
  updateProfitBar(firestoreId);
  updateSummary();
  try { await saveProj(proj); } catch(e){ console.error('Save error:',e); }
};

window.toggleItemVat = async function(firestoreId, side, itemId, btn){
  const proj = projects.find(p=>p.firestoreId===firestoreId); if(!proj) return;
  const arr  = side==='c' ? proj.clientItems : proj.supplierItems;
  const item = arr.find(i=>i.id===itemId); if(!item) return;
  item.vatex = !item.vatex;
  btn.textContent = item.vatex?'VAT Ex':'VAT In';
  btn.className   = item.vatex?'vt-btn vex':'vt-btn';
  const totEl = document.getElementById(`tot-${side}-${firestoreId}-${itemId}`);
  if(totEl) totEl.textContent = peso(itemTotal(item));
  const sideTotal = arr.reduce((s,i)=>s+itemTotal(i),0);
  const stEl = document.getElementById(`side-tot-${side}-${firestoreId}`);
  if(stEl) stEl.textContent = peso(sideTotal);
  updateProjBadge(firestoreId); updateProfitBar(firestoreId); updateSummary();
  try { await saveProj(proj); } catch(e){ console.error('Save error:',e); }
};

window.delItem = async function(firestoreId, side, itemId){
  const proj = projects.find(p=>p.firestoreId===firestoreId); if(!proj) return;
  if(side==='c') proj.clientItems   = proj.clientItems.filter(i=>i.id!==itemId);
  else           proj.supplierItems = proj.supplierItems.filter(i=>i.id!==itemId);
  try { await saveProj(proj); toast('Item removed.'); }
  catch(e){ toast('Error removing item.'); console.error(e); }
};

window.toggleNewVatBtn = function(el){
  const cur = el.dataset.val==='1';
  el.dataset.val = cur?'0':'1';
  el.textContent = cur?'VAT In':'VAT Ex';
  el.className   = cur?'vt-btn':'vt-btn vex';
};

function updateProjBadge(fid){
  const proj = projects.find(p=>p.firestoreId===fid); if(!proj) return;
  const {profit,margin} = calcProj(proj);
  const badge = document.getElementById(`badge-${fid}`);
  if(badge){ badge.className=`pbadge ${pc(profit)}`; badge.innerHTML=`${(profit>=0?'+':'')+peso(profit)} <span style="opacity:.7;font-size:10px;">(${margin.toFixed(1)}%)</span>`; }
}
function updateProfitBar(fid){
  const proj = projects.find(p=>p.firestoreId===fid); if(!proj) return;
  const {rev,cost,profit,margin} = calcProj(proj);
  const cl = pc(profit);
  const set = (id,val)=>{ const el=document.getElementById(id); if(el) el.textContent=val; };
  set(`pb-rev-${fid}`, peso(rev));
  set(`pb-cost-${fid}`, peso(cost));
  const prEl = document.getElementById(`pb-profit-${fid}`);
  if(prEl){ prEl.className=`pbar-val ${cl}`; prEl.innerHTML=`${(profit>=0?'+':'')+peso(profit)} <span style="font-size:11px;opacity:.7;">(${margin.toFixed(2)}%)</span>`; }

// ── RENDER ─────────────────────────────────────────────────
function itemsTable(proj, side){
  const arr  = side==='c' ? (proj.clientItems||[]) : (proj.supplierItems||[]);
  const s    = side==='c'?'c':'s';
  const fid  = proj.firestoreId;
  const supCol    = side==='s';
  const sideTotal = arr.reduce((sum,i)=>sum+itemTotal(i),0);

  const rows = arr.length ? arr.map(item=>{
    const tot   = itemTotal(item);
    const uOpts = UNITS.map(u=>`<option value="${u}"${u===item.unit?' selected':''}>${u}</option>`).join('');
    return `<tr>
      ${supCol?`<td><input class="cell-input" value="${(item.sup||'').replace(/"/g,'&quot;')}" onchange="updateItem('${fid}','${side}','${item.id}','sup',this.value)" placeholder="Supplier"/></td>`:''}
      <td><input class="cell-input" value="${item.desc.replace(/"/g,'&quot;')}" onchange="updateItem('${fid}','${side}','${item.id}','desc',this.value)" placeholder="Description"/></td>
      <td style="text-align:center;"><select class="cell-select" onchange="updateItem('${fid}','${side}','${item.id}','unit',this.value)">${uOpts}</select></td>
      <td><input class="cell-input mono" type="number" value="${item.qty}" min="0" step="any" onchange="updateItem('${fid}','${side}','${item.id}','qty',this.value)" style="text-align:right;"/></td>
      <td><input class="cell-input mono" type="number" value="${item.uprice}" min="0" step="0.01" onchange="updateItem('${fid}','${side}','${item.id}','uprice',this.value)" style="text-align:right;"/></td>
      <td><input class="cell-input mono" type="number" value="${item.disc||''}" min="0" max="100" step="0.01" placeholder="0" onchange="updateItem('${fid}','${side}','${item.id}','disc',this.value)" style="text-align:center;"/></td>
      <td style="text-align:center;"><button class="vt-btn${item.vatex?' vex':''}" onclick="toggleItemVat('${fid}','${side}','${item.id}',this)">${item.vatex?'VAT Ex':'VAT In'}</button></td>
      <td class="total-cell" id="tot-${side}-${fid}-${item.id}">${peso(tot)}</td>
      <td style="text-align:center;"><button class="idel" onclick="delItem('${fid}','${side}','${item.id}')">✕</button></td>
    </tr>`;
  }).join('') : `<tr><td colspan="${supCol?9:8}" class="empty-items">Walang items pa.</td></tr>`;

  const thSup = supCol?`<th style="width:14%">Supplier</th>`:'';
  const descW = supCol?'18%':'24%';
  return `<div class="tbl-wrap">
    <table>
      <thead><tr>
        ${thSup}
        <th style="width:${descW}">Description</th>
        <th style="width:7%;text-align:center;">Unit</th>
        <th style="width:9%;text-align:right;">Qty</th>
        <th style="width:12%;text-align:right;">Unit Price</th>
        <th style="width:8%;text-align:center;">Disc%</th>
        <th style="width:8%;text-align:center;">VAT</th>
        <th style="width:12%;text-align:right;">Total</th>
        <th style="width:4%;"></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
  <div class="side-total">
    <span class="side-total-label">${side==='c'?'Total Client Revenue':'Total Supplier Cost'}</span>
    <span class="side-total-val" id="side-tot-${side}-${fid}">${peso(sideTotal)}</span>
  </div>`;
}

function addItemForm(proj, side){
  const s      = side==='c'?'c':'s';
  const fid    = proj.firestoreId;
  const uOpts  = UNITS.map(u=>`<option>${u}</option>`).join('');

  return `<div class="add-item-wrap">
    <div class="sec-label">Add Item</div>
    <div style="display:grid;grid-template-columns:${cols};gap:6px;align-items:end;">
      ${supFld}
      <div class="fg"><label>Description</label><input id="i-desc-${s}-${fid}" type="text" placeholder="Item name"/></div>
      <div class="fg"><label>Unit</label><select id="i-unit-${s}-${fid}">${uOpts}</select></div>
      <div class="fg"><label>Qty</label><input id="i-qty-${s}-${fid}" type="number" placeholder="0" min="0" step="any"/></div>
      <div class="fg"><label>Unit Price (₱)</label><input id="i-up-${s}-${fid}" type="number" placeholder="0.00" min="0" step="0.01"/></div>
      <div class="fg"><label>Disc %</label><input id="i-disc-${s}-${fid}" type="number" placeholder="0" min="0" max="100" step="0.01"/></div>

function updateSummary(){
  const totRev  = projects.reduce((s,p)=>s+calcProj(p).rev,0);
  const totCost = projects.reduce((s,p)=>s+calcProj(p).cost,0);
  const netP    = totRev - totCost;
  const marg    = totRev>0 ? netP/totRev*100 : 0;
  document.getElementById('s-count').textContent  = projects.length;
  document.getElementById('s-rev').textContent    = peso(totRev);
  document.getElementById('s-cost').textContent   = peso(totCost);
  const sp = document.getElementById('s-profit');
  sp.textContent = (netP>=0?'+':'')+peso(netP); sp.className='mval '+pc(netP);
  const sm = document.getElementById('s-margin');
  sm.textContent = marg.toFixed(2)+'%'; sm.className='mval '+pc(netP);
  const over = projects.filter(p=>calcProj(p).profit<0).length;
  document.getElementById('s-sub').textContent = projects.length ? `${over} project${over!==1?'s':''} sa lugi` : '—';
}

// ── PDF EXPORT ─────────────────────────────────────────────
window.exportPDF = function(){
  if(!projects.length) return;
  const {jsPDF} = window.jspdf;
  const doc   = new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  const PW=297, PH=210;
  const today = new Date().toLocaleDateString('en-PH',{year:'numeric',month:'long',day:'numeric'});
  const totRev  = projects.reduce((s,p)=>s+calcProj(p).rev,0);
  const totCost = projects.reduce((s,p)=>s+calcProj(p).cost,0);
  const netP    = totRev-totCost;
  const marg    = totRev>0?(netP/totRev*100):0;
  const isProfit= netP>=0;
  const profCol = isProfit?[22,163,74]:[220,38,38];

  // ── helper: draw donut ──
  function drawDonut(cx,cy,r,pct,isPos,pctLabel,subLabel){
    doc.setFillColor(238,240,253); doc.circle(cx,cy,r,'F');
    if(pct>0.001){
      const steps=80,sa=-Math.PI/2,ea=sa+2*Math.PI*Math.min(pct,1),pts=[];
      for(let i=0;i<=steps;i++){const a=sa+(ea-sa)*i/steps;pts.push({x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)});}
      isPos?doc.setFillColor(74,222,128):doc.setFillColor(248,113,113);
      doc.moveTo(cx,cy);pts.forEach(p=>doc.lineTo(p.x,p.y));doc.lineTo(cx,cy);doc.fill();
    }
    doc.setFillColor(255,255,255);doc.circle(cx,cy,r*0.6,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(r*0.42);
    doc.setTextColor(isPos?22:220,isPos?163:38,isPos?74:38);
    doc.text(pctLabel,cx,cy+r*0.13,{align:'center'});
    if(subLabel){
      doc.setFont('helvetica','normal');doc.setFontSize(r*0.26);doc.setTextColor(144,149,176);
      doc.text(subLabel,cx,cy+r*0.45,{align:'center'});
    }
  }

  // ═══════════════════════════════════════════════
  // PAGE 1 — SUMMARY DASHBOARD
  // ═══════════════════════════════════════════════

  // Header band
  doc.setFillColor(79,93,232);doc.rect(0,0,PW,26,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(15);doc.setTextColor(255,255,255);
  doc.text('Profit Tracker Report',14,11);
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(180,186,220);
  doc.text('Client Revenue vs. Supplier Cost',14,19);
  doc.text('Generated: '+today,PW-14,19,{align:'right'});

  // ── Summary metric cards ──
  const cards=[
    {l:'Total Projects',   v:String(projects.length), c:null},
    {l:'Client Revenue',   v:pesoP(totRev),            c:null},
    {l:'Supplier Cost',    v:pesoP(totCost),            c:null},
    {l:'Net Profit',       v:(isProfit?'+':'')+pesoP(netP), c:profCol},
    {l:'Profit Margin',    v:marg.toFixed(2)+'%',       c:profCol},
  ];
  const cw=(PW-28-8)/5;
  cards.forEach((card,i)=>{
    const x=14+i*(cw+2),y=30;
    doc.setFillColor(255,255,255);doc.setDrawColor(226,228,237);doc.setLineWidth(0.25);
    doc.roundedRect(x,y,cw,16,1.5,1.5,'FD');
    doc.setFont('helvetica','normal');doc.setFontSize(6.5);doc.setTextColor(144,149,176);
    doc.text(card.l.toUpperCase(),x+cw/2,y+5.5,{align:'center'});
    doc.setFont('helvetica','bold');doc.setFontSize(9);
    card.c?doc.setTextColor(...card.c):doc.setTextColor(26,29,46);
    doc.text(card.v,x+cw/2,y+12,{align:'center'});
  });

  // ── Three chart panels ──
  // Panel backgrounds
  const panelY=50, panelH=105;
  // Left panel: Bar chart (profit per project)
  doc.setFillColor(248,249,252);doc.setDrawColor(226,228,237);doc.setLineWidth(0.25);
  doc.roundedRect(14,panelY,120,panelH,2,2,'FD');
  // Center panel: Donut
  doc.roundedRect(140,panelY,72,panelH,2,2,'FD');
  // Right panel: Rev vs Cost breakdown
  doc.roundedRect(218,panelY,65,panelH,2,2,'FD');

  // Panel titles
  doc.setFont('helvetica','bold');doc.setFontSize(7.5);doc.setTextColor(74,79,106);
  doc.text('Profit per Project',74,panelY+7,{align:'center'});
  doc.text('Overall Profit Margin',176,panelY+7,{align:'center'});
  doc.text('Revenue vs. Cost',250.5,panelY+7,{align:'center'});

  // ── Left: Bar chart ──
  const barData=projects.map(p=>{const{profit}=calcProj(p);return{label:p.name,value:profit};});
  const bChartX=18,bChartY=panelY+12,bChartW=110,bChartH=panelH-22;
  const maxV=Math.max(...barData.map(d=>Math.abs(d.value)),1);
  const n=barData.length;
  // Fixed bar width: sensible for 1–10 projects, max 18mm
  const bW=Math.min(18, Math.max(6, (bChartW-8)/(n*2)));
  const gap=(bChartW-8-n*bW)/(n+1);

  // Y-axis gridlines (3 levels)
  doc.setDrawColor(226,228,237);doc.setLineWidth(0.2);
  [0.25,0.5,0.75,1].forEach(f=>{
    const gy=bChartY+bChartH-(f*bChartH*0.85);
    doc.line(bChartX,gy,bChartX+bChartW,gy);
    doc.setFont('helvetica','normal');doc.setFontSize(5);doc.setTextColor(180,186,200);
    doc.text(pesoP(maxV*f).replace('P','P'),bChartX-1,gy+1,{align:'right'});
  });

  // Baseline
  doc.setDrawColor(200,202,212);doc.setLineWidth(0.4);
  doc.line(bChartX,bChartY+bChartH,bChartX+bChartW,bChartY+bChartH);

  barData.forEach((d,i)=>{
    const bh=Math.max((Math.abs(d.value)/maxV)*bChartH*0.85,1.5);
    const bx=bChartX+gap+(i*(bW+gap));
    const by=bChartY+bChartH-bh;
    d.value>=0?doc.setFillColor(74,222,128):doc.setFillColor(248,113,113);
    doc.roundedRect(bx,by,bW,bh,1,1,'F');
    // Value label above bar
    doc.setFont('helvetica','bold');doc.setFontSize(5.5);
    doc.setTextColor(d.value>=0?22:220,d.value>=0?163:38,d.value>=0?74:38);
    const vLabel=(d.value>=0?'+':'')+pesoP(Math.abs(d.value));
    doc.text(vLabel,bx+bW/2,by-1.5,{align:'center'});
    // Project name below baseline
    doc.setFont('helvetica','normal');doc.setFontSize(5.5);doc.setTextColor(74,79,106);
    const lbl=d.label.length>12?d.label.slice(0,11)+'…':d.label;
    doc.text(lbl,bx+bW/2,bChartY+bChartH+5,{align:'center'});
    // Margin % inside bar if tall enough
    if(bh>10){
      const {margin}=calcProj(projects[i]);
      doc.setFont('helvetica','bold');doc.setFontSize(5);
      doc.setTextColor(d.value>=0?15:180,d.value>=0?120:30,d.value>=0?50:30);
      doc.text(margin.toFixed(1)+'%',bx+bW/2,by+bh/2+1.5,{align:'center'});
    }
  });

  // ── Center: Donut ──
  const dcx=176,dcy=panelY+52,dr=30;
  const pct=totRev>0?Math.max(0,Math.min(netP/totRev,1)):0;
  drawDonut(dcx,dcy,dr,pct,isProfit,marg.toFixed(1)+'%','margin');
  // Legend below donut
  const legY=panelY+88;
  [[74,222,128,'Profit'],[238,240,253,'Cost']].forEach(([r,g,b,lbl],i)=>{
    const lx=148+i*36;
    doc.setFillColor(r,g,b);doc.roundedRect(lx,legY,8,4,1,1,'F');
    doc.setFont('helvetica','normal');doc.setFontSize(6.5);doc.setTextColor(74,79,106);
    doc.text(lbl,lx+10,legY+3.2);
  });
  // Net profit text
  doc.setFont('helvetica','bold');doc.setFontSize(8);
  doc.setTextColor(...profCol);
  doc.text((isProfit?'+':'')+pesoP(netP),dcx,panelY+98,{align:'center'});
  doc.setFont('helvetica','normal');doc.setFontSize(6.5);doc.setTextColor(144,149,176);
  doc.text('net profit',dcx,panelY+104,{align:'center'});

  // ── Right: Revenue vs Cost horizontal bars ──
  const rvX=222,rvY=panelY+14,rvW=57;
  const maxRC=Math.max(totRev,totCost,1);
  const rows=[
    {label:'Revenue',val:totRev,col:[79,93,232]},
    {label:'Cost',   val:totCost,col:[234,114,24]},
    {label:'Profit', val:Math.abs(netP),col:isProfit?[74,222,128]:[248,113,113]},
  ];
  rows.forEach((row,i)=>{
    const ry2=rvY+i*28;
    const bw2=Math.max((row.val/maxRC)*rvW,2);
    doc.setFont('helvetica','normal');doc.setFontSize(6.5);doc.setTextColor(74,79,106);
    doc.text(row.label,rvX,ry2+4);
    doc.setFillColor(238,240,253);doc.roundedRect(rvX,ry2+6,rvW,7,1,1,'F');
    doc.setFillColor(...row.col);doc.roundedRect(rvX,ry2+6,bw2,7,1,1,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(6.5);
    doc.setTextColor(...row.col);
    const prefix=row.label==='Profit'?(isProfit?'+':'-'):'';
    doc.text(prefix+pesoP(row.val),rvX,ry2+20);
  });
  // Profit margin pill
  const pmY=panelY+102;
  doc.setFillColor(...(isProfit?[220,252,231]:[254,226,226]));
  doc.roundedRect(222,pmY,61,10,2,2,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(8);
  doc.setTextColor(...profCol);
  doc.text('Margin: '+marg.toFixed(2)+'%',252.5,pmY+6.5,{align:'center'});

  // ── Per-project summary table at bottom ──
  if(projects.length>1){
    doc.autoTable({
      startY:panelY+panelH+4,
      head:[['Project','PO','Client','Revenue','Cost','Profit','Margin']],
      body:projects.map(p=>{
        const{rev,cost,profit,margin}=calcProj(p);
        return[p.name,p.po,p.client,pesoP(rev),pesoP(cost),(profit>=0?'+':'')+pesoP(profit),margin.toFixed(2)+'%'];
      }),
      styles:{font:'helvetica',fontSize:7,cellPadding:2.5,textColor:[74,79,106]},
      headStyles:{fillColor:[79,93,232],textColor:[255,255,255],fontSize:6.5,fontStyle:'bold'},
      alternateRowStyles:{fillColor:[248,249,252]},bodyStyles:{fillColor:[255,255,255]},
      tableLineColor:[226,228,237],tableLineWidth:0.1,
      columnStyles:{
        0:{cellWidth:60},1:{cellWidth:30},2:{cellWidth:35},
        3:{cellWidth:35,halign:'right'},4:{cellWidth:35,halign:'right'},
        5:{cellWidth:35,halign:'right'},6:{cellWidth:24,halign:'right'},
      },
      margin:{left:14,right:14},
      didParseCell:(d)=>{
        if(d.section==='body'&&d.column.index===5){
          const v=d.cell.raw;
          d.cell.styles.textColor=v.startsWith('-')?[220,38,38]:[22,163,74];
          d.cell.styles.fontStyle='bold';
        }
        if(d.section==='body'&&d.column.index===6){
          d.cell.styles.textColor=isProfit?[22,163,74]:[220,38,38];
        }
      }
    });
  }

  // ═══════════════════════════════════════════════
  // PAGE 2+ — DETAIL TABLES PER PROJECT
  // ═══════════════════════════════════════════════
  doc.addPage();
  let y=14;

  // Page 2 header
  doc.setFillColor(79,93,232);doc.rect(0,0,PW,14,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(255,255,255);
  doc.text('Project Detail Report',14,9.5);
  doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(180,186,220);
  doc.text(today,PW-14,9.5,{align:'right'});
  y=20;

  projects.forEach((proj,pi)=>{
    const {rev,cost,profit,margin}=calcProj(proj);
    const pIsProfit=profit>=0;
    const pCol=pIsProfit?[22,163,74]:[220,38,38];

    if(y>170){doc.addPage();y=14;}

    // Project header card
    doc.setFillColor(79,93,232);doc.roundedRect(14,y,PW-28,13,2,2,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(255,255,255);
    doc.text(proj.name,18,y+5.5);
    doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(180,186,220);
    doc.text(`PO: ${proj.po}   Client: ${proj.client}   Date: ${proj.date}`,18,y+11);

    // Profit badge on right

    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(255,255,255);
    doc.text(`${pIsProfit?'+':''} ${pesoP(profit)}  (${margin.toFixed(2)}%)`,PW-16,y+8,{align:'right'});
    y+=17;

    // Mini summary row for this project
    const miniCards=[
      {l:'Revenue', v:pesoP(rev), c:[79,93,232]},
      {l:'Cost',    v:pesoP(cost), c:[234,114,24]},
      {l:'Profit',  v:(pIsProfit?'+':'')+pesoP(profit), c:pCol},
      {l:'Margin',  v:margin.toFixed(2)+'%', c:pCol},
    ];
    const mcw=(PW-28-6)/4;
    miniCards.forEach((mc,i)=>{
      const mx=14+i*(mcw+2);
      doc.setFillColor(248,249,252);doc.setDrawColor(226,228,237);doc.setLineWidth(0.2);
      doc.roundedRect(mx,y,mcw,10,1.5,1.5,'FD');
      doc.setFont('helvetica','normal');doc.setFontSize(6);doc.setTextColor(144,149,176);
      doc.text(mc.l.toUpperCase(),mx+mcw/2,y+4,{align:'center'});
      doc.setFont('helvetica','bold');doc.setFontSize(7.5);
      doc.setTextColor(...mc.c);
      doc.text(mc.v,mx+mcw/2,y+9,{align:'center'});
    });
    y+=14;

    // Client items table
    if((proj.clientItems||[]).length){
      if(y>170){doc.addPage();y=14;}
      // Section label
      doc.setFillColor(238,240,253);doc.roundedRect(14,y,PW-28,7,1,1,'F');
      doc.setFont('helvetica','bold');doc.setFontSize(7.5);doc.setTextColor(79,93,232);
      doc.text('CLIENT ITEMS',18,y+5);
      const clientTotal=(proj.clientItems||[]).reduce((s,i)=>s+itemTotal(i),0);
      doc.text('Total: '+pesoP(clientTotal),PW-16,y+5,{align:'right'});
      y+=9;
      doc.autoTable({
        startY:y,
        head:[['Description','Unit','Qty','Unit Price','Disc%','VAT','Total']],
        body:(proj.clientItems||[]).map(i=>[
          i.desc, i.unit, i.qty.toLocaleString(),
          pesoP(i.uprice), i.disc?i.disc+'%':'—',
          i.vatex?'+12%':'incl', pesoP(itemTotal(i))
        ]),
        styles:{font:'helvetica',fontSize:8,cellPadding:3,textColor:[74,79,106]},
        headStyles:{fillColor:[238,240,253],textColor:[79,93,232],fontSize:7,fontStyle:'bold'},
        alternateRowStyles:{fillColor:[248,249,252]},bodyStyles:{fillColor:[255,255,255]},
        tableLineColor:[226,228,237],tableLineWidth:0.1,
        columnStyles:{
          0:{cellWidth:75},1:{cellWidth:16,halign:'center'},2:{cellWidth:18,halign:'right'},
          3:{cellWidth:32,halign:'right'},4:{cellWidth:16,halign:'center'},
          5:{cellWidth:14,halign:'center'},6:{cellWidth:36,halign:'right'}
        },
        margin:{left:14,right:14},
        didParseCell:(d)=>{
          if(d.section==='body'&&d.column.index===6){
            d.cell.styles.fontStyle='bold';d.cell.styles.textColor=[26,29,46];
          }
        }
      });
      y=doc.lastAutoTable.finalY+5;
    }

    // Supplier items table
    if((proj.supplierItems||[]).length){
      if(y>170){doc.addPage();y=14;}
      doc.setFillColor(255,244,236);doc.roundedRect(14,y,PW-28,7,1,1,'F');
      doc.setFont('helvetica','bold');doc.setFontSize(7.5);doc.setTextColor(234,114,24);
      doc.text('SUPPLIER ITEMS',18,y+5);
      const supTotal=(proj.supplierItems||[]).reduce((s,i)=>s+itemTotal(i),0);
      doc.text('Total: '+pesoP(supTotal),PW-16,y+5,{align:'right'});
      y+=9;
      doc.autoTable({
        startY:y,
        head:[['Supplier','Description','Unit','Qty','Unit Price','Disc%','VAT','Total']],
        body:(proj.supplierItems||[]).map(i=>[
          i.sup||'—', i.desc, i.unit, i.qty.toLocaleString(),
          pesoP(i.uprice), i.disc?i.disc+'%':'—',
          i.vatex?'+12%':'incl', pesoP(itemTotal(i))
        ]),
        styles:{font:'helvetica',fontSize:8,cellPadding:3,textColor:[74,79,106]},
        headStyles:{fillColor:[255,244,236],textColor:[234,114,24],fontSize:7,fontStyle:'bold'},
        alternateRowStyles:{fillColor:[248,249,252]},bodyStyles:{fillColor:[255,255,255]},
        tableLineColor:[226,228,237],tableLineWidth:0.1,
        columnStyles:{
          0:{cellWidth:38},1:{cellWidth:58},2:{cellWidth:14,halign:'center'},
          3:{cellWidth:16,halign:'right'},4:{cellWidth:30,halign:'right'},
          5:{cellWidth:14,halign:'center'},6:{cellWidth:14,halign:'center'},
          7:{cellWidth:30,halign:'right'}
        },
        margin:{left:14,right:14},
        didParseCell:(d)=>{
          if(d.section==='body'&&d.column.index===7){
            d.cell.styles.fontStyle='bold';d.cell.styles.textColor=[26,29,46];
          }
        }
      });
      y=doc.lastAutoTable.finalY+6;
    }

    // Profit summary line between projects
    if(pi<projects.length-1){
      doc.setDrawColor(226,228,237);doc.setLineWidth(0.3);
      doc.line(14,y,PW-14,y);
      y+=8;
    }
  });

  // ── Footer on all pages ──
  const pgCount=doc.internal.getNumberOfPages();
  for(let i=1;i<=pgCount;i++){
    doc.setPage(i);
    doc.setFillColor(248,249,252);doc.rect(0,PH-9,PW,9,'F');
    doc.setDrawColor(226,228,237);doc.setLineWidth(0.25);doc.line(0,PH-9,PW,PH-9);
    doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(144,149,176);
    doc.text('Profit Tracker — Confidential',14,PH-3.5);
    doc.text(`Page ${i} of ${pgCount}`,PW-14,PH-3.5,{align:'right'});
  }

  doc.save('profit-report.pdf');
  toast('PDF exported!');
};

</script>
</body>
</html>
